aid: phoenix
name: Arize Phoenix
description: >
  Arize Phoenix is an open-source AI observability and evaluation platform built
  on OpenTelemetry, enabling developers to trace, evaluate, and debug LLM
  applications in production or locally. Phoenix exposes a REST API for
  programmatically ingesting spans and traces, managing datasets, running
  experiments, submitting annotations, and querying evaluation results. The
  platform supports a wide range of LLM frameworks including LangChain,
  LlamaIndex, OpenAI, Anthropic, and CrewAI through auto-instrumentation. Phoenix
  can be self-hosted in a single command or used as a managed cloud service (Arize
  AX), with authentication via API keys and OAuth2/OIDC for enterprise
  deployments.
