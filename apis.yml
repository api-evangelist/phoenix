apis:
  - name: Arize Phoenix REST API
    description: >
      The Phoenix REST API provides programmatic access to all platform
      capabilities including trace ingestion via OpenTelemetry, span and trace
      annotation management, dataset upload and export, experiment creation and
      execution, annotation configuration, and project management. The API
      follows REST conventions with JSON request and response bodies and uses
      bearer token authentication via API keys.
