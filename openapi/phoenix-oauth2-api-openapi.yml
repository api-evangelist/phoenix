openapi: 3.0.3
info:
  title: Arize-Phoenix REST annotation_configs Oauth2 API
  description: Schema for Arize-Phoenix REST API
  version: '1.0'
tags:
- name: Oauth2
paths:
  /oauth2/{idp_name}/login:
    post:
      summary: Login
      operationId: login_oauth2__idp_name__login_post
      parameters:
      - name: idp_name
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          pattern: '[a-z0-9_]+'
          title: Idp Name
      - name: returnUrl
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Returnurl
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - Oauth2
    get:
      summary: Login
      operationId: login_oauth2__idp_name__login_get
      parameters:
      - name: idp_name
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          pattern: '[a-z0-9_]+'
          title: Idp Name
      - name: returnUrl
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Returnurl
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - Oauth2
  /oauth2/{idp_name}/tokens:
    get:
      summary: Create Tokens
      operationId: create_tokens_oauth2__idp_name__tokens_get
      parameters:
      - name: idp_name
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          pattern: '[a-z0-9_]+'
          title: Idp Name
      - name: state
        in: query
        required: true
        schema:
          type: string
          title: State
      - name: code
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Code
      - name: error
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Error
      - name: error_description
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Error Description
      - name: phoenix-oauth2-state
        in: cookie
        required: true
        schema:
          type: string
          title: Phoenix-Oauth2-State
      - name: phoenix-oauth2-nonce
        in: cookie
        required: true
        schema:
          type: string
          title: Phoenix-Oauth2-Nonce
      - name: phoenix-oauth2-code-verifier
        in: cookie
        required: false
        schema:
          type: string
          nullable: true
          title: Phoenix-Oauth2-Code-Verifier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - Oauth2
components:
  schemas:
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
